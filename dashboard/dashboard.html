<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paris Apartment Dashboard</title>
<style>
  :root {
    --bg: #fafaf8;
    --panel: #ffffff;
    --border: #e3e3df;
    --text: #1c1c1c;
    --muted: #6e6e6e;
    --accent: #1f3a5f;
    --green: #1c7c4c;
    --green-bg: #e1f3e8;
    --amber: #b06d00;
    --amber-bg: #fff3df;
    --red: #b3261e;
    --red-bg: #fde7e6;
    --blue: #1f4e84;
    --blue-bg: #e3edf8;
    --grey: #888;
    --grey-bg: #efefef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
  }
  header h1 {
    font-size: 22px;
    margin: 0 0 4px 0;
    color: var(--accent);
  }
  header .subtitle {
    font-size: 13px;
    color: var(--muted);
  }
  .summary-bar {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .stat {
    font-size: 12px;
    color: var(--muted);
  }
  .stat strong {
    display: block;
    font-size: 17px;
    color: var(--text);
    margin-top: 2px;
  }
  .controls {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: end;
  }
  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .ctrl label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .ctrl select, .ctrl input {
    border: 1px solid var(--border);
    background: white;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    min-width: 120px;
  }
  .ctrl .range-pair {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .ctrl .range-pair input {
    min-width: 80px;
    width: 90px;
  }
  .reset-btn {
    background: white;
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .reset-btn:hover { background: var(--bg); }
  main {
    padding: 18px 28px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  th, td {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  th {
    background: #f4f4f0;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    font-weight: 600;
  }
  th:hover { background: #ebebe5; }
  th .sort-indicator {
    color: var(--accent);
    margin-left: 4px;
    font-size: 10px;
  }
  tbody tr.summary-row {
    cursor: pointer;
  }
  tbody tr.summary-row:hover { background: #fafaf5; }
  tbody tr.summary-row.benchmark { background: #fef9e7; }
  tbody tr.summary-row.benchmark:hover { background: #fdf3d3; }
  td.title-cell {
    font-weight: 500;
    max-width: 320px;
  }
  td .subtle {
    color: var(--muted);
    font-size: 11px;
    display: block;
    margin-top: 2px;
  }
  td .badge-row {
    display: inline-flex;
    gap: 4px;
    margin-left: 6px;
  }
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .verdict {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .verdict.underpriced { background: var(--green-bg); color: var(--green); }
  .verdict.below-band { background: var(--blue-bg); color: var(--blue); }
  .verdict.in-band { background: var(--grey-bg); color: var(--text); }
  .verdict.above-band { background: var(--amber-bg); color: var(--amber); }
  .verdict.overpriced { background: var(--red-bg); color: var(--red); }
  .verdict.needs-data { background: #f0e8d9; color: #6b5e3e; }
  .premium-pos { color: var(--red); font-weight: 500; }
  .premium-neg { color: var(--green); font-weight: 500; }
  td.numeric { text-align: right; font-variant-numeric: tabular-nums; }
  th.numeric { text-align: right; }
  .expand-row td {
    padding: 0;
    background: #fafaf7;
  }
  .expand-content {
    padding: 18px 24px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 24px;
  }
  .expand-content .analysis {
    line-height: 1.7;
    font-size: 13.5px;
  }
  .expand-content .analysis p { margin: 0 0 10px 0; }
  .expand-content .analysis strong { color: var(--accent); }
  .expand-content .meta {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 12px;
  }
  .expand-content .meta dl {
    margin: 0;
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 4px 10px;
  }
  .expand-content .meta dt {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .expand-content .meta dd { margin: 0; }
  .expand-content .meta .image {
    margin-top: 12px;
    width: 100%;
    border-radius: 4px;
    background: #eee;
    object-fit: cover;
    max-height: 200px;
  }
  .url-link {
    display: inline-block;
    margin-top: 10px;
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    border-bottom: 1px dashed var(--accent);
  }
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .dvf-context {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--muted);
  }
  footer {
    padding: 24px 28px;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Paris Apartment Dashboard</h1>
  <div class="subtitle" id="subtitle">Loading…</div>
  <div class="summary-bar" id="summary-bar"></div>
</header>

<div class="controls">
  <div class="ctrl">
    <label>Arrondissement</label>
    <select id="filter-arr" multiple size="4" style="min-width:160px"></select>
  </div>
  <div class="ctrl">
    <label>Verdict</label>
    <select id="filter-verdict" multiple size="4" style="min-width:140px"></select>
  </div>
  <div class="ctrl">
    <label>Price (€M)</label>
    <div class="range-pair">
      <input type="number" id="price-min" step="0.05" placeholder="min" />
      <span>–</span>
      <input type="number" id="price-max" step="0.05" placeholder="max" />
    </div>
  </div>
  <div class="ctrl">
    <label>Surface (m²)</label>
    <div class="range-pair">
      <input type="number" id="surface-min" step="5" placeholder="min" />
      <span>–</span>
      <input type="number" id="surface-max" step="5" placeholder="max" />
    </div>
  </div>
  <div class="ctrl">
    <label>Search</label>
    <input type="text" id="search" placeholder="street, neighborhood, agent…" />
  </div>
  <button class="reset-btn" id="reset-btn">Reset</button>
</div>

<main>
  <details id="charts-block" style="margin-bottom:18px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px 18px">
    <summary style="cursor:pointer;font-weight:600;color:var(--accent);font-size:14px">📊 Market context charts (click to expand)</summary>
    <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:18px">
      <figure style="margin:0">
        <img src="charts/arr_comparison_violin.png" alt="Arr €/m² comparison" style="width:100%;border:1px solid var(--border);border-radius:4px" />
        <figcaption style="font-size:11px;color:var(--muted);margin-top:6px">€/m² distribution by arrondissement — clean ladder from 10th (cheapest) to 6th (priciest).</figcaption>
      </figure>
      <figure style="margin:0">
        <img src="charts/listings_vs_dvf_scatter.png" alt="Listings vs DVF" style="width:100%;border:1px solid var(--border);border-radius:4px" />
        <figcaption style="font-size:11px;color:var(--muted);margin-top:6px">Listings (stars) vs recent transactions. The Sainte-Apolline subject sits dramatically below the price cloud for 180+ m² apartments — same total price as a Left Bank pied-à-terre but ~60–100 m² more surface.</figcaption>
      </figure>
      <figure style="margin:0;grid-column:1/3">
        <img src="charts/eur_per_m2_distributions.png" alt="Histograms per arr" style="width:100%;border:1px solid var(--border);border-radius:4px" />
        <figcaption style="font-size:11px;color:var(--muted);margin-top:6px">€/m² histograms per arrondissement (cleaned apartment-only sales 2024-2025). Vertical lines: median (solid), p25/p75 (dashed).</figcaption>
      </figure>
    </div>
  </details>

  <table id="listings-table">
    <thead>
      <tr>
        <th data-sort="arr">Arr</th>
        <th data-sort="title">Property</th>
        <th data-sort="price_eur" class="numeric">Price</th>
        <th data-sort="surface_m2" class="numeric">Surface</th>
        <th data-sort="price_per_m2" class="numeric">€/m²</th>
        <th data-sort="dvf_band_median" class="numeric">Band median</th>
        <th data-sort="premium_vs_median_pct" class="numeric">Δ vs median</th>
        <th data-sort="verdict">Verdict</th>
      </tr>
    </thead>
    <tbody id="listings-body"></tbody>
  </table>
  <div id="empty-state" class="empty-state" style="display:none">
    No listings match the current filters.
  </div>
</main>

<footer id="footer"></footer>

<script>
(function() {
  let data;
  try {
    data = JSON.parse(document.getElementById('listings-data').textContent);
  } catch (e) {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#b00">Listings data missing or invalid. Re-run build_dashboard.py.</div>';
    return;
  }

  const listings = data.listings;

  // ---- Subtitle + summary ----
  document.getElementById('subtitle').textContent =
    `Generated ${data.generated_at} • Filters: €${(data.filter_criteria.budget_eur[0]/1e6).toFixed(1)}M–€${(data.filter_criteria.budget_eur[1]/1e6).toFixed(1)}M • ${data.filter_criteria.surface_m2[0]}–${data.filter_criteria.surface_m2[1]} m² • ${data.filter_criteria.geography}`;

  const verdictCount = {};
  listings.forEach(l => { verdictCount[l.verdict] = (verdictCount[l.verdict] || 0) + 1; });

  document.getElementById('summary-bar').innerHTML = `
    <div class="stat">Listings<strong>${listings.length}</strong></div>
    <div class="stat">In-band<strong>${verdictCount['in-band'] || 0}</strong></div>
    <div class="stat">Below band<strong>${verdictCount['below-band'] || 0}</strong></div>
    <div class="stat">Above band<strong>${verdictCount['above-band'] || 0}</strong></div>
    <div class="stat">Overpriced<strong>${verdictCount['overpriced'] || 0}</strong></div>
    <div class="stat">Needs data<strong>${verdictCount['needs-data'] || 0}</strong></div>
  `;

  // ---- Populate filter selects ----
  const arrs = [...new Set(listings.map(l => l.arr))].sort();
  const arrSel = document.getElementById('filter-arr');
  arrs.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = `${a} — Paris ${parseInt(a.slice(-2))}${parseInt(a.slice(-2))==1?'st':parseInt(a.slice(-2))==2?'nd':parseInt(a.slice(-2))==3?'rd':'th'}`;
    arrSel.appendChild(opt);
  });

  const verdicts = ['underpriced', 'below-band', 'in-band', 'above-band', 'overpriced', 'needs-data'];
  const verdictSel = document.getElementById('filter-verdict');
  verdicts.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    verdictSel.appendChild(opt);
  });

  // ---- State ----
  let sortBy = 'price_eur';
  let sortDir = 'asc';
  const expanded = new Set();

  function getFilters() {
    return {
      arrs: [...arrSel.selectedOptions].map(o => o.value),
      verdicts: [...verdictSel.selectedOptions].map(o => o.value),
      priceMin: parseFloat(document.getElementById('price-min').value) * 1e6 || null,
      priceMax: parseFloat(document.getElementById('price-max').value) * 1e6 || null,
      surfaceMin: parseFloat(document.getElementById('surface-min').value) || null,
      surfaceMax: parseFloat(document.getElementById('surface-max').value) || null,
      search: document.getElementById('search').value.toLowerCase().trim(),
    };
  }

  function applyFilters(rows, f) {
    return rows.filter(l => {
      if (f.arrs.length && !f.arrs.includes(l.arr)) return false;
      if (f.verdicts.length && !f.verdicts.includes(l.verdict)) return false;
      if (f.priceMin && (l.price_eur || 0) < f.priceMin) return false;
      if (f.priceMax && (l.price_eur || Infinity) > f.priceMax) return false;
      if (f.surfaceMin && (l.surface_m2 || 0) < f.surfaceMin) return false;
      if (f.surfaceMax && (l.surface_m2 || Infinity) > f.surfaceMax) return false;
      if (f.search) {
        const hay = `${l.title} ${l.neighborhood||''} ${l.street||''} ${l.source||''} ${l.arr_name||''}`.toLowerCase();
        if (!hay.includes(f.search)) return false;
      }
      return true;
    });
  }

  function sortRows(rows) {
    return [...rows].sort((a, b) => {
      let av = a[sortBy], bv = b[sortBy];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') {
        const cmp = av.localeCompare(bv);
        return sortDir === 'asc' ? cmp : -cmp;
      }
      return sortDir === 'asc' ? av - bv : bv - av;
    });
  }

  // ---- Tiny markdown-ish renderer for the expert_analysis blob ----
  function renderAnalysis(md) {
    if (!md) return '';
    return md
      .split(/\n\n+/)
      .map(p =>
        '<p>' + p
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>')
        + '</p>'
      )
      .join('');
  }

  function renderRow(l, idx) {
    const isExpanded = expanded.has(l.id);
    const ppm = l.price_per_m2 ? `€${l.price_per_m2.toLocaleString()}` : '—';
    const bandMed = l.dvf_band_median ? `€${l.dvf_band_median.toLocaleString()}` : '—';
    const premium = l.premium_vs_median_pct;
    const premStr = (premium == null) ? '—' :
      `<span class="${premium > 0 ? 'premium-pos' : 'premium-neg'}">${premium > 0 ? '+' : ''}${premium.toFixed(1)}%</span>`;
    const benchmarkBadge = l.benchmark ? `<span class="badge" style="background:#fef3c7;color:#92400e">Benchmark</span>` : '';
    const exclusiveBadge = l.exclusive ? `<span class="badge" style="background:#e0e7ff;color:#3730a3">Exclusive</span>` : '';

    const summary = `
      <tr class="summary-row ${l.benchmark ? 'benchmark' : ''}" data-id="${l.id}">
        <td>${l.arr_name || l.arr}</td>
        <td class="title-cell">${l.title}<span class="subtle">${l.neighborhood || ''}${l.source ? ' · ' + l.source : ''}</span><span class="badge-row">${benchmarkBadge}${exclusiveBadge}</span></td>
        <td class="numeric">€${(l.price_eur/1e6).toFixed(2)}M</td>
        <td class="numeric">${l.surface_m2 ? l.surface_m2.toFixed(0) + ' m²' : '—'}</td>
        <td class="numeric">${ppm}</td>
        <td class="numeric">${bandMed}</td>
        <td class="numeric">${premStr}</td>
        <td><span class="verdict ${l.verdict || 'needs-data'}">${l.verdict || 'needs-data'}</span></td>
      </tr>`;

    if (!isExpanded) return summary;

    const bandLine = l.dvf_band_n
      ? `${l.arr_name} ${l.dvf_band_label} band: median €${l.dvf_band_median?.toLocaleString()}/m² (n=${l.dvf_band_n}), IQR €${l.dvf_band_p25?.toLocaleString()}–€${l.dvf_band_p75?.toLocaleString()}.`
      : 'No band DVF data available.';
    const arrLine = l.dvf_arr_median
      ? `${l.arr_name} overall median: €${l.dvf_arr_median.toLocaleString()}/m² across ${l.dvf_arr_n} cleaned 2024-25 apartment-only sales.`
      : '';

    const expanded_html = `
      <tr class="expand-row">
        <td colspan="8">
          <div class="expand-content">
            <div class="analysis">
              ${renderAnalysis(l.expert_analysis)}
              <div class="dvf-context">
                ${arrLine}<br>
                ${bandLine}
              </div>
              ${l.url ? `<a class="url-link" href="${l.url}" target="_blank" rel="noopener">Open listing ↗</a>` : ''}
            </div>
            <div class="meta">
              <dl>
                <dt>Source</dt><dd>${l.source || '—'}</dd>
                <dt>Reference</dt><dd>${l.id}</dd>
                <dt>Street</dt><dd>${l.street || '—'}</dd>
                <dt>Floor</dt><dd>${l.floor ?? '—'}${l.max_floor ? ` / ${l.max_floor}` : ''}</dd>
                <dt>Elevator</dt><dd>${l.elevator === true ? 'Yes' : l.elevator === false ? 'No' : '—'}</dd>
                <dt>Bedrooms</dt><dd>${l.bedrooms ?? '—'}</dd>
                <dt>Exposure</dt><dd>${l.exposure || '—'}</dd>
                <dt>Year built</dt><dd>${l.year_built ?? '—'}</dd>
                <dt>Condition</dt><dd>${l.condition || '—'}</dd>
                <dt>DPE</dt><dd>${l.dpe_class || '—'}</dd>
                <dt>Charges/yr</dt><dd>${l.charges_yr_eur ? '€' + l.charges_yr_eur.toLocaleString() : '—'}</dd>
                <dt>Taxe fonc.</dt><dd>${l.taxe_fonciere_eur ? '€' + l.taxe_fonciere_eur.toLocaleString() : '—'}</dd>
              </dl>
              ${l.image ? `<img class="image" src="${l.image}" alt="" onerror="this.style.display='none'" />` : ''}
            </div>
          </div>
        </td>
      </tr>`;

    return summary + expanded_html;
  }

  function render() {
    const f = getFilters();
    const filtered = applyFilters(listings, f);
    const sorted = sortRows(filtered);
    const tbody = document.getElementById('listings-body');
    tbody.innerHTML = sorted.map((l, i) => renderRow(l, i)).join('');

    document.getElementById('empty-state').style.display = sorted.length === 0 ? 'block' : 'none';

    document.querySelectorAll('th[data-sort]').forEach(th => {
      const k = th.dataset.sort;
      th.querySelectorAll('.sort-indicator').forEach(s => s.remove());
      if (k === sortBy) {
        const ind = document.createElement('span');
        ind.className = 'sort-indicator';
        ind.textContent = sortDir === 'asc' ? '▲' : '▼';
        th.appendChild(ind);
      }
    });

    document.querySelectorAll('tr.summary-row').forEach(tr => {
      tr.addEventListener('click', () => {
        const id = tr.dataset.id;
        if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
        render();
      });
    });

    document.getElementById('footer').textContent =
      `${sorted.length} of ${listings.length} listings shown • DVF source: data.gouv.fr geo-DVF`;
  }

  // ---- Event wiring ----
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (sortBy === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortBy = k; sortDir = ['price_eur', 'surface_m2', 'price_per_m2', 'dvf_band_median', 'premium_vs_median_pct'].includes(k) ? 'asc' : 'asc'; }
      render();
    });
  });

  ['filter-arr','filter-verdict','price-min','price-max','surface-min','surface-max','search'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
    document.getElementById(id).addEventListener('change', render);
  });
  document.getElementById('reset-btn').addEventListener('click', () => {
    arrSel.selectedIndex = -1;
    verdictSel.selectedIndex = -1;
    ['price-min','price-max','surface-min','surface-max','search'].forEach(id => document.getElementById(id).value = '');
    expanded.clear();
    render();
  });

  render();
})();
</script>
